    function showError(message) {
      const error = document.getElementById("load-error");
      error.textContent = message;
      error.style.display = "block";
    }

    function registerOverlays(api) {
      api.registerOverlay({
        name: "paTextLabel",
        totalStep: 1,
        needDefaultPointFigure: false,
        needDefaultXAxisFigure: false,
        needDefaultYAxisFigure: false,
        createPointFigures: ({ coordinates, overlay }) => {
          const point = coordinates[0];
          const label = overlay.extendData?.label ?? "";
          const fill = overlay.extendData?.fill ?? "#1d4ed8";
          const dx = overlay.extendData?.dx ?? 0;
          const dy = overlay.extendData?.dy ?? 0;
          const labelX = point.x + dx;
          const labelY = point.y - 24 + dy;
          return [
            {
              type: "rect",
              attrs: { x: labelX - 18, y: labelY - 11, width: 36, height: 22 },
              styles: { style: "fill", color: fill, borderRadius: 5 }
            },
            {
              type: "text",
              attrs: { x: labelX, y: labelY, text: label, align: "center", baseline: "middle" },
              styles: { color: "#ffffff", size: 12, weight: "bold" }
            },
            {
              type: "line",
              attrs: { coordinates: [{ x: labelX, y: labelY + 11 }, { x: point.x, y: point.y - 1 }] },
              styles: { color: fill, size: 1 }
            }
          ];
        }
      });

      api.registerOverlay({
        name: "paLevel",
        totalStep: 1,
        needDefaultPointFigure: false,
        needDefaultXAxisFigure: false,
        needDefaultYAxisFigure: false,
        createPointFigures: ({ coordinates, bounding, overlay }) => {
          const point = coordinates[0];
          const text = overlay.extendData?.text ?? "";
          const color = overlay.extendData?.color ?? "#2563eb";
          return [
            {
              type: "line",
              attrs: { coordinates: [{ x: 0, y: point.y }, { x: bounding.width, y: point.y }] },
              styles: { color, size: 1, dashedValue: [4, 4] }
            },
            {
              type: "text",
              attrs: { x: bounding.width - 8, y: point.y - 7, text, align: "right", baseline: "bottom" },
              styles: { color, size: 12, weight: "bold" }
            }
          ];
        }
      });
    }

    function mountChart() {
      if (!window.klinecharts) {
        showError("klinecharts 未加载。请检查网络，或后续改为 bun add klinecharts 后本地打包。");
        return;
      }

      const chart = window.klinecharts.init("chart", {
        styles: {
          candle: {
            bar: {
              upColor: "#d64545",
              downColor: "#168a5a",
              noChangeColor: "#6b7280",
              upBorderColor: "#d64545",
              downBorderColor: "#168a5a",
              noChangeBorderColor: "#6b7280",
              upWickColor: "#d64545",
              downWickColor: "#168a5a",
              noChangeWickColor: "#6b7280"
            }
          },
          grid: {
            horizontal: { color: "#edf2f7" },
            vertical: { color: "#edf2f7" }
          }
        }
      });

      registerOverlays(window.klinecharts);

      const bars = [...barsNewestFirst].reverse();
      chart.applyNewData(bars);

      chart.setOffsetRightDistance(40);
      chart.createIndicator("VOL", false);
      chart.createIndicator("MA", false, { id: "candle_pane" });

      const labelLayout = [
        { fill: "#1d4ed8", dx: 22, dy: 38 },
        { fill: "#334155", dx: 18, dy: 10 },
        { fill: "#334155", dx: 8, dy: -18 },
        { fill: "#334155", dx: -8, dy: -34 },
        { fill: "#334155", dx: -22, dy: -50 }
      ];
      barsNewestFirst.slice(0, 5).forEach((bar, index) => {
        const layout = labelLayout[index];
        chart.createOverlay({
          name: "paTextLabel",
          points: [{ timestamp: bar.timestamp, value: bar.high }],
          extendData: { label: `K${index + 1}`, ...layout }
        });
      });

      [
        { value: 19.39, text: "压力 19.39", color: "#d97706" },
        { value: 19.06, text: "压力 19.06", color: "#d97706" },
        { value: 17.12, text: "支撑 17.12", color: "#2563eb" },
        { value: 15.93, text: "支撑 15.93", color: "#2563eb" }
      ].forEach((level) => {
        chart.createOverlay({
          name: "paLevel",
          points: [{ timestamp: bars[0].timestamp, value: level.value }],
          extendData: level
        });
      });
    }

    window.addEventListener("load", mountChart);
  </script>
